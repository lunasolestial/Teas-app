<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9580D4"/>
      <stop offset="55%" stop-color="#2050C8"/>
      <stop offset="100%" stop-color="#2AAFA3"/>
    </linearGradient>
    <linearGradient id="badge-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle noise overlay circles for depth -->
  <circle cx="150" cy="150" r="280" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1100" cy="500" r="320" fill="rgba(0,0,0,0.08)"/>
  <circle cx="900" cy="80" r="180" fill="rgba(255,255,255,0.05)"/>

  <!-- Logo badge -->
  <rect x="80" y="60" width="130" height="130" rx="28" fill="url(#badge-bg)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="145" y="148" text-anchor="middle" fill="white" font-family="Georgia,serif" font-style="italic" font-weight="400" font-size="72" filter="url(#glow)">li</text>

  <!-- Brand name -->
  <text x="240" y="118" fill="white" font-family="Georgia,'Times New Roman',serif" font-weight="700" font-size="68" letter-spacing="-1">LI Lab</text>

  <!-- Tagline under brand -->
  <text x="240" y="162" fill="rgba(255,255,255,0.75)" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-weight="500" font-size="26" letter-spacing="1">ATI TEAS 7 Study Platform</text>

  <!-- Divider -->
  <rect x="80" y="230" width="480" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>

  <!-- Description -->
  <text x="80" y="285" fill="rgba(255,255,255,0.9)" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-weight="400" font-size="30">Master the TEAS exam with targeted lessons,</text>
  <text x="80" y="328" fill="rgba(255,255,255,0.9)" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-weight="400" font-size="30">practice quizzes, and progress tracking.</text>

  <!-- Subject pills -->
  <rect x="80" y="385" width="148" height="46" rx="23" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="154" y="414" text-anchor="middle" fill="white" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-weight="600" font-size="20">Reading</text>

  <rect x="246" y="385" width="118" height="46" rx="23" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="305" y="414" text-anchor="middle" fill="white" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-weight="600" font-size="20">Math</text>

  <rect x="382" y="385" width="138" height="46" rx="23" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="451" y="414" text-anchor="middle" fill="white" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-weight="600" font-size="20">Science</text>

  <rect x="538" y="385" width="138" height="46" rx="23" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="607" y="414" text-anchor="middle" fill="white" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-weight="600" font-size="20">English</text>

  <!-- 120 Questions stat card -->
  <rect x="80" y="460" width="620" height="2" rx="1" fill="rgba(255,255,255,0.15)"/>
  <text x="80" y="515" fill="rgba(255,255,255,0.65)" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-weight="500" font-size="22">120 TEAS-style questions · 12 topics · CPCC readiness tracking</text>

  <!-- Right side decorative syringe icon area -->
  <rect x="820" y="200" width="300" height="300" rx="40" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Simplified syringe icon drawn in SVG -->
  <g transform="translate(900, 240) rotate(45)">
    <!-- barrel -->
    <rect x="10" y="40" width="34" height="90" rx="4" fill="rgba(255,255,255,0.5)"/>
    <!-- plunger -->
    <rect x="22" y="10" width="10" height="35" rx="2" fill="rgba(255,255,255,0.6)"/>
    <rect x="14" y="44" width="26" height="8" rx="2" fill="rgba(255,255,255,0.3)"/>
    <!-- needle -->
    <rect x="24" y="130" width="6" height="40" rx="3" fill="rgba(255,255,255,0.4)"/>
    <!-- graduation marks -->
    <line x1="10" y1="75" x2="20" y2="75" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="10" y1="90" x2="20" y2="90" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="10" y1="105" x2="20" y2="105" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  </g>
  <!-- Score indicator -->
  <text x="970" y="420" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-weight="700" font-size="52">80%</text>
  <text x="970" y="455" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-weight="500" font-size="20">CPCC target</text>

  <!-- Bottom domain -->
  <text x="80" y="588" fill="rgba(255,255,255,0.45)" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-weight="400" font-size="20">lilab.app</text>
</svg>
